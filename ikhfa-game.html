<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Ихфа или Идгам? — Игра по таджвиду">
<meta property="og:description" content="Интерактивная игра для детей — определи правило мима!">
<meta property="og:image" content="https://dzhos7465-dotcom.github.io/tajweed/preview.png">

<meta name="theme-color" content="#0f172a">
<title>Ихфа или Идгам? — Игра по таджвиду</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:     #0f172a;
    --bg2:    #1e293b;
    --bg3:    #273449;
    --card:   #1e2d45;
    --accent: #f59e0b;
    --accent2:#fbbf24;
    --green:  #10b981;
    --red:    #ef4444;
    --blue:   #38bdf8;
    --purple: #a78bfa;
    --text:   #f8fafc;
    --muted:  #94a3b8;
    --arabic: 'Amiri', 'Scheherazade New', serif;
    --ui:     'Baloo 2', 'Nunito', sans-serif;
    --radius: 20px;
    --shadow: 0 8px 32px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1.5px 1.5px at 10% 15%, #fff6 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, #fff5 0%, transparent 100%),
      radial-gradient(2px 2px at 40% 10%, #fff4 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 55%, #fff7 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 20%, #fff5 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 45%, #fff6 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 70%, #fff3 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 80%, #fff5 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 75%, #fff4 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, #fff6 0%, transparent 100%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen { width: 100%; animation: fadeIn 0.5s ease; }
  .screen.hidden { display: none !important; }

  @keyframes fadeIn  { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pop     { 0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)} }
  @keyframes shake   { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes spinRing{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes conffall{ 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(120vh) rotate(720deg);opacity:0} }
  @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ══ START SCREEN ══ */
  #start-screen {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 30px; gap: 0; text-align: center;
  }

  .logo-wrap {
    position: relative;
    width: 130px; height: 130px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }
  .logo-circle {
    width: 120px; height: 120px; border-radius: 50%;
    background: linear-gradient(135deg, #38bdf8, #a78bfa, #f59e0b);
    display: flex; align-items: center; justify-content: center;
    font-size: 54px;
    box-shadow: 0 0 40px #38bdf855;
    animation: float 3s ease-in-out infinite;
  }
  .logo-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    border: 3px dashed #38bdf855;
    animation: spinRing 8s linear infinite;
  }

  .title-main {
    font-size: clamp(26px, 7vw, 40px); font-weight: 900;
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.1; margin-bottom: 6px;
  }
  .title-sub {
    font-size: clamp(14px, 3.5vw, 17px);
    color: var(--muted); margin-bottom: 28px; line-height: 1.6;
    max-width: 400px;
  }

  .info-card {
    background: var(--card);
    border: 1.5px solid #334155;
    border-radius: var(--radius);
    padding: 22px; width: 100%;
    margin-bottom: 28px;
    box-shadow: var(--shadow);
    text-align: left;
  }
  .info-card h3 {
    font-size: 16px; font-weight: 800; color: var(--accent);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }

  .rule-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; border-radius: 12px;
    margin-bottom: 10px;
  }
  .rule-row:last-child { margin-bottom: 0; }
  .rule-row.ikhfa { background: #0c2a4444; border: 1.5px solid #38bdf833; }
  .rule-row.idgham { background: #1a0f3c44; border: 1.5px solid #a78bfa33; }

  .rule-arabic {
    font-family: var(--arabic);
    font-size: 26px; direction: rtl;
    line-height: 1.6; min-width: 90px; text-align: center;
  }
  .rule-row.ikhfa .rule-arabic { color: var(--blue); }
  .rule-row.idgham .rule-arabic { color: var(--purple); }

  .rule-info { flex: 1; }
  .rule-name { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
  .rule-row.ikhfa .rule-name { color: var(--blue); }
  .rule-row.idgham .rule-name { color: var(--purple); }
  .rule-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .btn-start {
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    color: #fff; border: none; border-radius: 50px;
    padding: 18px 52px; font-size: 20px; font-weight: 800;
    cursor: pointer; font-family: var(--ui);
    box-shadow: 0 6px 24px #38bdf855;
    transition: transform .15s, box-shadow .15s;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .btn-start:hover { transform: scale(1.05); }
  .btn-start:active { transform: scale(.97); }

  /* ══ GAME SCREEN ══ */
  #game-screen { padding-top: 10px; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; width: 100%;
  }

  .score-row {
    display: flex; gap: 10px;
  }
  .score-pill {
    border-radius: 50px; padding: 6px 16px;
    font-weight: 800; font-size: 15px;
    display: flex; align-items: center; gap: 6px;
  }
  .score-pill.correct {
    background: var(--card); border: 1.5px solid var(--green);
    color: var(--green);
  }
  .score-pill.wrong {
    background: var(--card); border: 1.5px solid var(--red);
    color: var(--red);
  }
  .q-counter { font-size: 14px; color: var(--muted); font-weight: 600; }

  .progress-bar-wrap {
    width: 100%; background: var(--bg3);
    border-radius: 50px; height: 12px;
    margin-bottom: 22px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #38bdf8, #a78bfa);
    border-radius: 50px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
    min-width: 6px;
  }

  .game-card {
    background: var(--card);
    border: 1.5px solid #334155;
    border-radius: var(--radius);
    padding: 28px 22px 22px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    transition: border-color .3s;
    text-align: center;
  }
  .game-card.correct { border-color: var(--green); }
  .game-card.wrong   { border-color: var(--red); }

  .ayah-label {
    font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
    text-align: left;
  }

  .ayah-text {
    font-family: var(--arabic);
    font-size: clamp(28px, 8vw, 44px);
    direction: rtl; text-align: center;
    line-height: 1.9; color: #f1f5f9;
    margin-bottom: 16px; padding: 14px;
    background: #0f172a66; border-radius: 12px;
  }

  .audio-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: #1e3a5f; border: 1.5px solid #3b82f6;
    color: #93c5fd; border-radius: 50px;
    padding: 9px 22px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: var(--ui);
    transition: background .2s, transform .15s;
    margin-bottom: 20px;
  }
  .audio-btn:hover { background: #1e40af; transform: scale(1.04); }
  .audio-btn.playing { background: #1e40af; animation: pulse 1s infinite; }

  .game-question {
    font-size: 17px; font-weight: 800; color: #e2e8f0;
    margin-bottom: 20px;
  }

  .game-btns {
    display: flex; gap: 14px;
  }

  .btn-game {
    flex: 1; padding: 20px 10px;
    border: 2.5px solid; border-radius: 18px;
    font-size: clamp(15px, 4vw, 18px); font-weight: 900;
    cursor: pointer; font-family: var(--ui);
    transition: transform .15s, box-shadow .15s, background .2s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    line-height: 1.3;
  }
  .btn-game .btn-icon { font-size: 28px; }

  .btn-ikhfa {
    background: #0c2a4422; border-color: var(--blue); color: var(--blue);
  }
  .btn-ikhfa:hover:not(:disabled) {
    background: #0c2a4466; transform: scale(1.04);
    box-shadow: 0 4px 20px #38bdf855;
  }
  .btn-idgham {
    background: #1a0f3c22; border-color: var(--purple); color: var(--purple);
  }
  .btn-idgham:hover:not(:disabled) {
    background: #1a0f3c55; transform: scale(1.04);
    box-shadow: 0 4px 20px #a78bfa55;
  }

  .btn-game:disabled { opacity: .55; cursor: default; transform: none !important; }

  .btn-game.selected-correct {
    opacity: 1 !important;
    animation: pop .3s ease;
  }
  .btn-ikhfa.selected-correct { background: #38bdf8 !important; color: #fff !important; border-color: #38bdf8 !important; }
  .btn-idgham.selected-correct { background: #a78bfa !important; color: #fff !important; border-color: #a78bfa !important; }

  .btn-game.selected-wrong {
    opacity: 1 !important;
    animation: shake .4s ease;
  }
  .btn-ikhfa.selected-wrong  { background: var(--red) !important; color: #fff !important; border-color: var(--red) !important; }
  .btn-idgham.selected-wrong { background: var(--red) !important; color: #fff !important; border-color: var(--red) !important; }

  .btn-game.show-correct {
    opacity: 1 !important;
  }
  .btn-ikhfa.show-correct  { background: #38bdf822 !important; border-color: var(--blue) !important; }
  .btn-idgham.show-correct { background: #a78bfa22 !important; border-color: var(--purple) !important; }

  .feedback-box {
    margin-top: 16px; border-radius: 14px; padding: 14px 18px;
    font-size: 14px; line-height: 1.7; display: none;
    animation: fadeIn .35s ease;
  }
  .feedback-box.correct { background: #064e3b55; border: 1.5px solid var(--green); color: #6ee7b7; }
  .feedback-box.wrong   { background: #7f1d1d33; border: 1.5px solid var(--red); color: #fca5a5; }
  .feedback-title { font-weight: 800; font-size: 15px; margin-bottom: 5px; }

  .btn-next {
    display: none; width: 100%;
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    color: #fff; border: none; border-radius: 16px;
    padding: 16px; font-size: 18px; font-weight: 800;
    cursor: pointer; font-family: var(--ui);
    margin-top: 16px; box-shadow: 0 4px 20px #38bdf844;
    transition: transform .15s;
  }
  .btn-next:hover { transform: scale(1.02); }
  .btn-next:active { transform: scale(.98); }

  /* ══ RESULT SCREEN ══ */
  #result-screen {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 30px; gap: 20px; text-align: center;
  }

  .result-emoji {
    font-size: 80px;
    animation: float 2.5s ease-in-out infinite;
    filter: drop-shadow(0 6px 16px #38bdf855);
  }
  .result-title {
    font-size: clamp(24px, 7vw, 36px); font-weight: 900;
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .result-score-box {
    background: var(--card); border: 2px solid var(--blue);
    border-radius: var(--radius); padding: 24px 44px;
    box-shadow: var(--shadow);
  }
  .result-score-num { font-size: 64px; font-weight: 900; color: var(--blue); line-height: 1; }
  .result-score-lbl { font-size: 15px; color: var(--muted); margin-top: 4px; }
  .result-stars { font-size: 34px; }
  .result-msg {
    font-size: 16px; font-weight: 700; color: #e2e8f0;
    line-height: 1.6; max-width: 380px;
  }

  .btn-restart {
    background: linear-gradient(135deg, #38bdf8, #a78bfa);
    color: #fff; border: none; border-radius: 50px;
    padding: 16px 48px; font-size: 18px; font-weight: 800;
    cursor: pointer; font-family: var(--ui);
    box-shadow: 0 6px 24px #38bdf855;
    transition: transform .15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-restart:hover { transform: scale(1.05); }

  .conf {
    position: fixed; pointer-events: none; z-index: 999;
    border-radius: 3px; animation: conffall linear forwards;
  }

  @media (max-width: 420px) {
    .ayah-text { font-size: 26px; }
    .btn-game { font-size: 14px; padding: 16px 8px; }
    .result-score-num { font-size: 52px; }
    .game-btns { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="container">

  <!-- ══ START ══ -->
  <div id="start-screen" class="screen">
    <div class="logo-wrap">
      <div class="logo-circle">🎮</div>
      <div class="logo-ring"></div>
    </div>
    <div class="title-main">Ихфа или Идгам?</div>
    <div class="title-sub">
      Посмотри на аят и определи — какое здесь правило мима?
    </div>

    <div class="info-card">
      <h3>⚡ Вспомни правила</h3>
      <div class="rule-row ikhfa">
        <div class="rule-arabic">مۡ + ب</div>
        <div class="rule-info">
          <div class="rule-name">🫧 Ихфа мима</div>
          <div class="rule-desc">Скрытое чтение с носовым звуком</div>
        </div>
      </div>
      <div class="rule-row idgham">
        <div class="rule-arabic">مۡ + م</div>
        <div class="rule-info">
          <div class="rule-name">🔗 Идгам мима</div>
          <div class="rule-desc">Слияние мима с носовым звуком</div>
        </div>
      </div>
    </div>

    <button class="btn-start" onclick="startGame()">
      <span>🚀</span> Начать игру!
    </button>
  </div>

  <!-- ══ GAME ══ -->
  <div id="game-screen" class="screen hidden">
    <div class="top-bar">
      <div class="score-row">
        <div class="score-pill correct">✅ <span id="score-correct">0</span></div>
        <div class="score-pill wrong">❌ <span id="score-wrong">0</span></div>
      </div>
      <div class="q-counter">Аят <span id="q-num">1</span> из 10</div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="game-card" id="game-card">
      <div class="ayah-label">📜 Определи правило</div>
      <div class="ayah-text" id="ayah-text"></div>

      <button class="audio-btn" id="audio-btn" onclick="playAudio()">
        <span>🔊</span>
        <span id="audio-label">Воспроизвести</span>
      </button>

      <div class="game-question">Какое здесь правило мима?</div>

      <div class="game-btns">
        <button class="btn-game btn-ikhfa" id="btn-ikhfa" onclick="answer('ikhfa')">
          <span class="btn-icon">🫧</span>
          Ихфа мима
        </button>
        <button class="btn-game btn-idgham" id="btn-idgham" onclick="answer('idgham')">
          <span class="btn-icon">🔗</span>
          Идгам мима
        </button>
      </div>

      <div class="feedback-box" id="feedback-box">
        <div class="feedback-title" id="feedback-title"></div>
        <div id="feedback-body"></div>
      </div>

      <button class="btn-next" id="btn-next" onclick="nextQuestion()"></button>
    </div>
  </div>

  <!-- ══ RESULT ══ -->
  <div id="result-screen" class="screen hidden">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title"></div>
    <div class="result-stars" id="result-stars"></div>
    <div class="result-score-box">
      <div class="result-score-num"><span id="final-score">0</span>/10</div>
      <div class="result-score-lbl">правильных ответов</div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-restart" onclick="restartGame()">🔄 Сыграть снова</button>
  </div>

</div>
<script>
// ══════════════════════════════
// ДАННЫЕ
// ══════════════════════════════
const ALL_AYAHS = [
  {
    ayah:  "هُمۡ بِهَا",
    rule:  "ikhfa",
    audio: "audio-ikhfa/ayt1.MP3",
    expl:  "مۡ перед ب — это ихфа мима (скрытое чтение)."
  },
  {
    ayah:  "أَنتُم بِهِۦ مُؤۡمِنُونَ",
    rule:  "ikhfa",
    audio: "audio-ikhfa/ayt2.MP3",
    expl:  "مۡ перед ب — это ихфа мима (скрытое чтение)."
  },
  {
    ayah:  "فَتَرۡمِيهِم بِحِجَارَةٍ مِّن سِجِّيلٍ",
    rule:  "ikhfa",
    audio: "audio-ikhfa/ayt3.MP3",
    expl:  "هِم перед بِ — مۡ + ب, это ихфа мима."
  },
  {
    ayah:  "وَمَا هُم بِخَٰرِجِينَ مِنَ ٱلنَّارِ",
    rule:  "ikhfa",
    audio: "audio-ikhfa/ayt4.MP3",
    expl:  "هُم перед بِ — مۡ + ب, это ихфа мима."
  },
  {
    ayah:  "وَهُم بِٱلۡأٓخِرَةِ كَٰفِرُونَ",
    rule:  "ikhfa",
    audio: "audio-ikhfa/ayt5.MP3",
    expl:  "هُم перед بِ — مۡ + ب, это ихфа мима."
  },
  {
    ayah:  "لَهُم مَّا يَشَآءُونَ",
    rule:  "idgham",
    audio: "audio-ikhfa/ayt6.MP3",
    expl:  "مۡ перед م — это идгам мима (слияние)."
  },
  {
    ayah:  "عَلَيۡهِم مُّؤۡصَدَةُۢ",
    rule:  "idgham",
    audio: "audio-ikhfa/ayt7.MP3",
    expl:  "هِم перед مُّ — مۡ + م, это идгам мима."
  },
  {
    ayah:  "وَلَكُم مَّا كَسَبۡتُمۡ",
    rule:  "idgham",
    audio: "audio-ikhfa/ayt8.MP3",
    expl:  "كُم перед مَّ — مۡ + م, это идгам мима."
  },
  {
    ayah:  "فِي قُلُوبِهِم مَّرَضٌ",
    rule:  "idgham",
    audio: "audio-ikhfa/ayt9.MP3",
    expl:  "هِم перед مَّ — مۡ + م, это идгам мима."
  },
  {
    ayah:  "لَهُم مَّغۡفِرَةٌ وَأَجۡرٌ عَظِيمٌ",
    rule:  "idgham",
    audio: "audio-ikhfa/ayt10.MP3",
    expl:  "هُم перед مَّ — مۡ + م, это идгам мима."
  }
];

// ══════════════════════════════
// STATE
// ══════════════════════════════
let questions  = [];
let current    = 0;
let scoreRight = 0;
let scoreWrong = 0;
let answered   = false;
let currentAudio = null;

// ══════════════════════════════
// GAME LOGIC
// ══════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startGame() {
  questions  = shuffle(ALL_AYAHS);
  current    = 0;
  scoreRight = 0;
  scoreWrong = 0;
  answered   = false;
  showScreen('game-screen');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];

  // Progress
  document.getElementById('progress-bar').style.width = (current/10*100)+'%';
  document.getElementById('q-num').textContent = current+1;
  document.getElementById('score-correct').textContent = scoreRight;
  document.getElementById('score-wrong').textContent = scoreWrong;

  // Ayah
  document.getElementById('ayah-text').textContent = q.ayah;

  // Audio
  const audioBtn = document.getElementById('audio-btn');
  audioBtn.classList.remove('playing');
  document.getElementById('audio-label').textContent = 'Воспроизвести';
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  // Reset card
  document.getElementById('game-card').className = 'game-card';

  // Reset buttons
  const btnI = document.getElementById('btn-ikhfa');
  const btnD = document.getElementById('btn-idgham');
  btnI.className = 'btn-game btn-ikhfa';
  btnD.className = 'btn-game btn-idgham';
  btnI.disabled = false;
  btnD.disabled = false;

  // Reset feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  document.getElementById('btn-next').style.display = 'none';
}

function answer(choice) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const isCorrect = (choice === q.rule);

  const btnI = document.getElementById('btn-ikhfa');
  const btnD = document.getElementById('btn-idgham');
  const card = document.getElementById('game-card');
  const fb   = document.getElementById('feedback-box');

  btnI.disabled = true;
  btnD.disabled = true;

  // Mark selected button
  const selectedBtn = choice === 'ikhfa' ? btnI : btnD;
  selectedBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');

  // Show correct if wrong
  if (!isCorrect) {
    const correctBtn = q.rule === 'ikhfa' ? btnI : btnD;
    correctBtn.classList.add('show-correct');
  }

  card.classList.add(isCorrect ? 'correct' : 'wrong');

  if (isCorrect) {
    scoreRight++;
    playTone('success');
    spawnConfetti();
    fb.className = 'feedback-box correct';
    document.getElementById('feedback-title').textContent = '✅ Правильно!';
  } else {
    scoreWrong++;
    playTone('error');
    fb.className = 'feedback-box wrong';
    document.getElementById('feedback-title').textContent = '❌ Неправильно';
  }

  document.getElementById('score-correct').textContent = scoreRight;
  document.getElementById('score-wrong').textContent = scoreWrong;
  document.getElementById('feedback-body').textContent = q.expl;
  fb.style.display = 'block';

  const btnNext = document.getElementById('btn-next');
  btnNext.style.display = 'block';
  btnNext.textContent = current < 9 ? 'Следующий →' : 'Посмотреть результат 🏆';
}

function nextQuestion() {
  current++;
  if (current >= 10) {
    showResult();
  } else {
    loadQuestion();
    const card = document.getElementById('game-card');
    card.style.animation = 'none';
    requestAnimationFrame(() => { card.style.animation = 'fadeIn .4s ease'; });
  }
}

// ══════════════════════════════
// AUDIO
// ══════════════════════════════
function playAudio() {
  const q = questions[current];
  if (!q.audio) return;

  const btn = document.getElementById('audio-btn');
  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    btn.classList.remove('playing');
    document.getElementById('audio-label').textContent = 'Воспроизвести';
    return;
  }

  currentAudio = new Audio(q.audio);
  btn.classList.add('playing');
  document.getElementById('audio-label').textContent = 'Воспроизводится...';
  currentAudio.play().catch(()=>{});
  currentAudio.onended = () => {
    btn.classList.remove('playing');
    document.getElementById('audio-label').textContent = 'Воспроизвести';
  };
}

// ══════════════════════════════
// RESULT
// ══════════════════════════════
function showResult() {
  document.getElementById('final-score').textContent = scoreRight;
  const stars = Math.round((scoreRight/10)*5);
  document.getElementById('result-stars').textContent = '⭐'.repeat(stars)+'☆'.repeat(5-stars);

  let emoji, title, msg;
  if (scoreRight === 10) {
    emoji='🏆'; title='МашаАллах! Отлично!';
    msg='Ты правильно определил все 10 аятов! Продолжай так же! 🌟';
  } else if (scoreRight >= 8) {
    emoji='🌟'; title='Замечательно!';
    msg='Почти всё правильно! Ещё немного практики — и будет идеально! 💪';
  } else if (scoreRight >= 6) {
    emoji='😊'; title='Хорошая работа!';
    msg='Неплохой результат! Повтори правила и попробуй снова! 📖';
  } else if (scoreRight >= 4) {
    emoji='💪'; title='Продолжай учиться!';
    msg='Перечитай правила и сыграй ещё раз — с каждым разом лучше! 🌱';
  } else {
    emoji='📚'; title='Не сдавайся!';
    msg='Вернись к правилам и попробуй снова. Ты справишься! 🤍';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;
  if (scoreRight >= 8) spawnConfetti(60);
  showScreen('result-screen');
}

function restartGame() { showScreen('start-screen'); }

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.style.animation = 'none';
  requestAnimationFrame(() => { el.style.animation = 'fadeIn .5s ease'; });
}

function playTone(type) {
  try {
    const snd = new Audio(type === 'success' ? 'audio/success.wav' : 'audio/error.wav');
    snd.play().catch(()=>{});
  } catch(e) {}
}

function spawnConfetti(n=28) {
  const cols = ['#38bdf8','#a78bfa','#f59e0b','#10b981','#ec4899','#fbbf24'];
  for (let i=0; i<n; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'conf';
      c.style.cssText = `
        left:${Math.random()*100}vw; top:-20px;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        width:${6+Math.random()*8}px; height:${8+Math.random()*10}px;
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*.5}s;
        transform:rotate(${Math.random()*360}deg)`;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i*50);
  }
}
</script>
